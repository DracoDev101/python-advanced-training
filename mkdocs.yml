site_name: Python / Django 生产级后端系统训练营
site_description: Python 运行时、Django、Celery、Daphne、Gunicorn、greenlet 与 monkey patch 的生产级后端训练资料
repo_url: https://github.com/DracoDev101/python-advanced-training
repo_name: DracoDev101/python-advanced-training

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details

nav:
